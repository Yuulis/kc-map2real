name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip v prefix for package.json
        id: version
        run: echo "bare=${VERSION#v}" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}

      - name: Bump package.json version
        run: npm version "${{ steps.version.outputs.bare }}" --no-git-tag-version

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: ${{ inputs.version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          DRAFT_TAG=$(gh release list --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' | head -1)
          if [ -n "$DRAFT_TAG" ]; then
            gh release edit "$DRAFT_TAG" \
              --tag "${{ inputs.version }}" \
              --title "${{ inputs.version }}" \
              --draft=false \
              $PRERELEASE_FLAG
          else
            gh release create "${{ inputs.version }}" \
              --title "${{ inputs.version }}" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi
